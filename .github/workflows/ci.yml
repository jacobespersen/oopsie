name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oopsie
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/oopsie
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/oopsie
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check . && ruff format --check .

      - name: Run mypy
        run: mypy oopsie

      - name: Run bandit
        run: bandit -r oopsie -ll

      - name: Run pip-audit
        # CVE-2026-4539: pygments 2.19.2 — no fix release available yet
        run: pip-audit --ignore-vuln CVE-2026-4539

      - name: Run pytest
        run: pytest -v --cov=oopsie --cov-report=term-missing --cov-fail-under=90
