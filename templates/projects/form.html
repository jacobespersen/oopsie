{% extends "base.html" %}
{% block title %}{{ title }} - Oopsie{% endblock %}
{% block content %}
<h1 class="f2 mb-3">{{ title }}</h1>
<form method="post" action="{% if project %}/orgs/{{ org_slug }}/projects/{{ project.id }}{% else %}/orgs/{{ org_slug }}/projects{% endif %}" style="max-width:500px;">
  <div class="form-group">
    <div class="form-group-header"><label for="name">Name</label></div>
    <div class="form-group-body">
      <input class="form-control" type="text" id="name" name="name" required value="{{ project.name if project else '' }}" placeholder="My Project">
    </div>
  </div>

  <div class="form-group">
    <div class="form-group-header"><label for="github_repo_url">GitHub Repo URL</label></div>
    <div class="form-group-body">
      <input class="form-control" type="url" id="github_repo_url" name="github_repo_url" required value="{{ project.github_repo_url if project else '' }}" placeholder="https://github.com/user/repo">
    </div>
  </div>

  <div class="form-group">
    <div class="form-group-header"><label for="github_token">GitHub Token</label></div>
    <div class="form-group-body">
      <input class="form-control" type="password" id="github_token" name="github_token" {% if not project %}required{% endif %} placeholder="{% if project %}Leave blank to keep current{% else %}github_xxx{% endif %}">
      {% if project %}<p class="note">Leave blank to keep the existing token.</p>{% endif %}
    </div>
  </div>

  <div class="form-group">
    <div class="form-group-header"><label for="default_branch">Default Branch</label></div>
    <div class="form-group-body">
      <input class="form-control" type="text" id="default_branch" name="default_branch" value="{{ project.default_branch if project else 'main' }}" placeholder="main">
    </div>
  </div>

  <div class="form-group">
    <div class="form-group-header"><label for="error_threshold">Error Threshold</label></div>
    <div class="form-group-body">
      <input class="form-control" type="number" id="error_threshold" name="error_threshold" min="1" value="{{ project.error_threshold if project else 10 }}" placeholder="10">
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mt-3">
    <button type="submit" class="btn btn-primary">{{ 'Update' if project else 'Create' }}</button>
    {% if project %}<a href="/orgs/{{ org_slug }}/projects/{{ project.id }}/errors" class="btn">View Errors</a>{% endif %}
    {% if project %}<a href="/orgs/{{ org_slug }}/projects/{{ project.id }}/api-key" class="btn">View API Key</a>{% endif %}
    <a href="/orgs/{{ org_slug }}/projects" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
