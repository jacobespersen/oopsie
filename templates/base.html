<!DOCTYPE html>
<html lang="en" data-color-mode="light" data-light-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Oopsie{% endblock %}</title>
  <link rel="stylesheet" href="https://unpkg.com/@primer/css@21/dist/primer.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="Header" data-color-mode="dark" data-dark-theme="dark">
    <div class="Header-item">
      <a href="/" class="Header-link f4 text-bold">Oopsie</a>
    </div>
    <div class="Header-item">
      <a href="/orgs/{{ org_slug }}/projects" class="Header-link">Projects</a>
    </div>
    <div class="Header-item">
      <a href="/orgs/{{ org_slug }}/members" class="Header-link">Members</a>
    </div>
    <div class="Header-item Header-item--full"></div>
    {% if user %}
    <div class="Header-item d-flex flex-items-center gap-2">
      {% if user.avatar_url %}
      <img src="{{ user.avatar_url }}" alt="{{ user.name }}" width="24" height="24" class="avatar circle">
      {% endif %}
      <span class="Header-link color-fg-on-emphasis f6">{{ user.name }}</span>
    </div>
    <div class="Header-item">
      <form method="post" action="/auth/logout" style="margin: 0;">
        <button type="submit" class="Header-link btn-link f6" style="background: none; border: none; cursor: pointer; color: inherit;">
          Sign out
        </button>
      </form>
    </div>
    {% endif %}
  </header>
  <main class="container-lg p-responsive py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
