{% extends "base.html" %}
{% block title %}Project Created - Oopsie{% endblock %}
{% block content %}
<h1 class="f2 mb-3">Project Created</h1>
<div class="flash flash-warn mb-3">
  <strong>Copy the API key now</strong> — it won't be shown again.
</div>
<div class="Box mb-3">
  <div class="Box-body">
    <pre class="f6 overflow-auto">{{ api_key }}</pre>
  </div>
</div>
<a href="/orgs/{{ org_slug }}/projects" class="btn">Back to Projects</a>
{% endblock %}
