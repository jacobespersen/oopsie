name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oopsie
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/oopsie
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/oopsie
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check . && ruff format --check .

      - name: Run mypy
        run: mypy oopsie

      - name: Run bandit
        run: bandit -r oopsie -ll

      - name: Run pip-audit
        run: pip-audit

      - name: Run pytest
        run: pytest -v --cov=oopsie --cov-report=term-missing --cov-fail-under=90

  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%s)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/jacobespersen/oopsie:${{ steps.tag.outputs.tag }}
            ghcr.io/jacobespersen/oopsie:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/jacobespersen/oopsie-worker:${{ steps.tag.outputs.tag }}
            ghcr.io/jacobespersen/oopsie-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
